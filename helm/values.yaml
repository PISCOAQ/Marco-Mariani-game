image:
  repository: ghcr.io/piscoaq/marco-mariani-game
  tag: main
  pullPolicy: Always
httpRoute:
  enabled: false
  hostnames:
  - mmgame.polyglot-edu.com

volumeMounts:
  - name: tmp
    mountPath: /tmp
  # Writable dirs for nginx when root filesystem is read-only
  - name: nginx-conf-d
    mountPath: /etc/nginx/conf.d
  - name: nginx-cache
    mountPath: /var/cache/nginx
  - name: nginx-run
    mountPath: /var/run

volumes:
  - name: tmp
    emptyDir: {}
  - name: nginx-conf-d
    emptyDir: {}
  - name: nginx-cache
    emptyDir: {}
  - name: nginx-run
    emptyDir: {}